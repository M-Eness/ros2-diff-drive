slam_toolbox:
  ros__parameters:

    ########## Genel ##########
    use_sim_time: true
    mode: mapping

    ########## Frame Ayarları ##########
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    ########## Lidar ##########
    scan_topic: /scan
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 8.0
    laser_min_range: 0.05
    laser_max_range: 8.0

    ########## Harita ##########
    resolution: 0.05            # 5 cm / pixel
    max_laser_range: 8.0

    ########## Hareket Eşikleri ##########
    minimum_travel_distance: 0.3     # 20 cm gitmeden scan ekleme
    minimum_travel_heading: 0.3      # ~11 derece dönmeden scan ekleme

    ########## Scan Matching ##########
    use_scan_matching: true
    use_scan_barycenter: true

    ########## Loop Closing ##########
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_maximum_variance_fine: 1.0

    ########## Performans / Stabilite ##########
    transform_timeout: 0.2
    tf_buffer_duration: 30.0

    ########## Debug (Foxglove için faydalı) ##########
    enable_interactive_mode: false