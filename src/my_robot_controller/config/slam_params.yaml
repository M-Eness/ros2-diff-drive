slam_toolbox:
  ros__parameters:

    ########## Genel ##########
    use_sim_time: true
    mode: mapping

    ########## Frame Ayarları ##########
    map_frame: map
    odom_frame: odom
    base_frame: base_footprint

    ########## Lidar ##########
    scan_topic: /scan
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 8.0
    laser_min_range: 0.05
    laser_max_range: 8.0

    ########## Harita ##########
    resolution: 0.05            # 5 cm / pixel
    max_laser_range: 8.0

    ########## Hareket Eşikleri ##########
    minimum_travel_distance: 0.05
    minimum_travel_heading: 0.05

    ########## Scan Matching ##########
    use_scan_matching: true
    use_scan_barycenter: true

    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01

    link_match_minimum_response_fine: 0.05

    ########## Loop Closing ##########
    do_loop_closing: true
    loop_search_maximum_distance: 3.0
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_maximum_variance_fine: 1.0

    ########## Performans / Stabilite ##########
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    transform_publish_period: 0.02
    map_update_interval: 1.0

    ########## Debug (Foxglove için faydalı) ##########
    enable_interactive_mode: false